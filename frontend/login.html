<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | SilentVoice AI</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Logo -->

    <div class="logo">

        

        <h1>SilentVoice AI</h1>

        <h3>Giving Every Gesture a Voice</h3>

        <p>
            AI Powered Sign Language Recognition Platform
        </p>

    </div>

    <!-- Message -->

    <div id="message"></div>

    <!-- Login Form -->

    <form id="loginForm">

        <div class="input-box">

            <label>Email Address</label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

        </div>

        <div class="input-box">

            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required>

        </div>

        <button
            type="submit"
            class="btn"
            id="loginBtn">

            🔐 Sign In

        </button>

    </form>

    <div class="divider">

        <span>OR</span>

    </div>

    <div class="link">

        New to SilentVoice AI?

        <a href="register.html">

            Create Account

        </a>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
