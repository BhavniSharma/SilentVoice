<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users | ConnectHub</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>ConnectHub</h2>
        </div>

        <ul>

            <li onclick="window.location='dashboard.html'">
                🏠 Dashboard
            </li>

            <li class="active">
                👥 Users
            </li>

            <li onclick="window.location='profile.html'">
                👤 Profile
            </li>

            <li>
                ⚙ Settings
            </li>

            <li id="logoutBtn">
                🚪 Logout
            </li>

        </ul>

    </aside>

    <main class="main">

        <nav class="navbar">

            <h2>Registered Users</h2>

            <input
                type="text"
                id="searchInput"
                placeholder="Search User..."
                class="search-box">

        </nav>

        <section class="table-section">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="usersTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/users.js"></script>

</body>
</html>
