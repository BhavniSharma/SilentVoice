<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | ConnectHub</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="logo">

        <h1>ConnectHub</h1>

        <p>Create your account</p>

    </div>

    <div id="message"></div>

    <form id="registerForm">

        <div class="input-box">

            <label>Full Name</label>

            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required>

        </div>

        <div class="input-box">

            <label>Email</label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

        </div>

        <div class="input-box">

            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Create password"
                required>

        </div>

        <div class="input-box">

            <label>Confirm Password</label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
                required>

        </div>

        <div class="input-box">

            <label>Age</label>

            <input
                type="number"
                id="age"
                placeholder="Enter your age"
                required>

        </div>

        <button
            type="submit"
            class="btn"
            id="registerBtn">

            Register

        </button>

    </form>

    <div class="link">

        Already have an account?

        <a href="login.html">

            Login

        </a>

    </div>

</div>
<script src="js/register.js"></script>  
</body>
</html>
