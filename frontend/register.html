<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | SilentVoice AI</title>

<link rel="stylesheet" href="/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="logo">

<h1>SilentVoice AI</h1>

<h3>Create Your Account ✨</h3>

<p>

Join the future of AI-powered communication.

</p>

</div>

<div id="message"></div>

<form id="registerForm">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

</div>

<div class="input-box">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-box">

<label>Password</label>

<div class="password-wrapper">

<input
type="password"
id="password"
placeholder="Create password"
required>

<i class="fa-solid fa-eye toggle-password"
onclick="togglePassword('password',this)">
</i>

</div>

<div id="strengthText"
style="margin-top:8px;font-size:13px;">
</div>

</div>

<div class="input-box">

<label>Confirm Password</label>

<div class="password-wrapper">

<input
type="password"
id="confirmPassword"
placeholder="Confirm password"
required>

<i class="fa-solid fa-eye toggle-password"
onclick="togglePassword('confirmPassword',this)">
</i>

</div>

<div id="matchText"
style="margin-top:8px;font-size:13px;">
</div>

</div>

<div class="input-box">

<label>Age</label>

<input
type="number"
id="age"
placeholder="Enter your age"
min="1"
max="120"
required>

</div>

<button
type="submit"
class="btn"
id="registerBtn">

Create Account

</button>

</form>

<div class="divider">

<span>OR</span>

</div>

<div class="link">

Already have an account?

<a href="/login">

Login

</a>

</div>

<div class="link"
style="margin-top:18px;">

<a href="/">

← Back to Home

</a>

</div>

</div>

<script>

function togglePassword(id,icon){

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");

}else{

input.type="password";

icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");

}

}

const password=document.getElementById("password");
const confirm=document.getElementById("confirmPassword");

password.addEventListener("input",()=>{

const text=document.getElementById("strengthText");

const value=password.value;

if(value.length===0){

text.innerHTML="";

return;

}

let score=0;

if(value.length>=8) score++;
if(/[A-Z]/.test(value)) score++;
if(/[a-z]/.test(value)) score++;
if(/[0-9]/.test(value)) score++;
if(/[^A-Za-z0-9]/.test(value)) score++;

if(score<=2){

text.innerHTML="🔴 Weak Password";
text.style.color="#ff5c70";

}

else if(score<=4){

text.innerHTML="🟡 Medium Password";
text.style.color="#ffd54f";

}

else{

text.innerHTML="🟢 Strong Password";
text.style.color="#32d583";

}

});

confirm.addEventListener("input",()=>{

const match=document.getElementById("matchText");

if(confirm.value===""){

match.innerHTML="";
return;

}

if(confirm.value===password.value){

match.innerHTML="✅ Passwords Match";
match.style.color="#32d583";

}else{

match.innerHTML="❌ Passwords Do Not Match";
match.style.color="#ff5c70";

}

});

</script>

<script src="/js/register.js"></script>

</body>

</html>
